name: HR-Proximity Tracker

on:
  schedule:
    # 06:00 ET (10:00 UTC during EDT) — catches games finished overnight
    - cron: "0 10 * * *"
    # 12:00 ET (16:00 UTC during EDT) — MLB posts game-day forecasts mid-morning,
    # after the 06:00 run; this re-run picks them up so the published ranking is
    # weather-adjusted before first pitch instead of all-neutral.
    - cron: "0 16 * * *"
    # 23:00 ET (03:00 UTC during EDT) — catches day games + early finals
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to process (YYYY-MM-DD); defaults to today ET if omitted"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: hr-tracker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python scripts/run_pipeline.py --date "${{ inputs.date }}"
          elif [ "${{ github.event.schedule }}" = "0 10 * * *" ] \
            || [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            # Morning/noon sweeps: re-process yesterday ET in full. GitHub cron
            # can fire late; if the 23:00 ET run slips past midnight it processes
            # the (empty) new day instead — these runs self-heal that. The noon
            # run also lands after MLB posts today's forecasts, so its ranking
            # carries real weather factors.
            python scripts/run_pipeline.py --yesterday
          else
            python scripts/run_pipeline.py
          fi

      - name: Commit data and site
        run: |
          git config user.name "hr-tracker-bot"
          git config user.email "actions@github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Data update: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
